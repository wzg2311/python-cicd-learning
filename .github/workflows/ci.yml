# ============================================================
#  GitHub Actions CI/CD 流水线配置
#  文件位置: .github/workflows/ci.yml
#  触发条件: push到main分支 或 pull request到main分支
#  包含: 拉代码 → 配Python → 装依赖 → 代码检查 → 测试 → 部署
# ============================================================

name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'   # feature分支也会触发，方便开发调试CI
  pull_request:
    branches:
      - main
      - master

# 环境变量（全局）
env:
  PYTHON_VERSION: "3.12"

jobs:
  # ==================== Job 1: 代码质量检查 ====================
  lint:
    name: 🔍 代码质量检查 (flake8)
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: 拉取代码（从GitHub仓库下载最新代码）
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2: 配置Python环境
      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Step 3: 安装依赖
      - name: 📦 Install dependencies (with flake8)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: 运行flake8代码风格检查
      - name: ✅ Lint with flake8
        run: |
          # 停止在首次发现错误时（不继续扫描整个项目）
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # 完整检查：输出所有警告但作为信息展示（零退出码）
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  # ==================== Job 2: 单元测试 ====================
  test:
    name: 🧪 单元测试 (pytest)
    runs-on: ubuntu-latest
    # 依赖lint任务通过后再运行测试（可以并行，这里串行更清晰）
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step: 运行pytest单元测试（带覆盖率报告）
      - name: 🧪 Run pytest tests
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml

      # Step: 上传覆盖率报告（可选，用于查看覆盖趋势）
      - name: 📊 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ==================== Job 3: 模拟部署 ====================
  deploy:
    name: 🚀 模拟部署
    runs-on: ubuntu-latest
    needs: test  # 必须测试通过才能部署！
    # 仅push到main/master才触发部署（PR只跑测试不部署）
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 模拟部署步骤：
      # 1) 运行程序验证能正常启动
      # 2) 输出部署信息（真实项目中这里会替换为ssh/docker/k8s等操作）
      - name: 🚀 Simulate deployment
        run: |
          echo "=========================================="
          echo "  🚀 开始模拟部署..."
          echo "=========================================="
          echo ""
          echo "📍 部署环境: ${{ github.ref }}"
          echo "🔗 提交SHA: ${{ github.sha }}"
          echo "👤 触发者: ${{ github.actor }}"
          echo "🕐 部署时间: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo ""
          
          # 运行主程序验证可执行性
          echo "✅ 运行主程序验证..."
          python main.py
          
          echo ""
          echo "=========================================="
          echo "  ✅ 部署成功！（模拟）"
          echo "=========================================="

      # （真实项目中）发送部署通知
      - name: 📢 Deployment summary
        if: always()
        run: |
          echo "## 🚀 部署摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **环境**: Production (模拟)" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **触发者**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **状态**: ✅ 成功" >> $GITHUB_STEP_SUMMARY
