# ============================================================
#  GitHub Actions CI/CD 流水线配置 (v2 - 含可执行程序打包)
#  文件位置: .github/workflows/ci.yml
#  触发条件: push到main分支 / tag v* / PR到main分支
#
#  流水线架构:
#    lint → test → [build, deploy] 并行 → release
#
#    build Job: PyInstaller 打包为单文件Linux可执行程序 (.elf)
#    最终 Release 包含: 源码tar.gz / zip + linux-x86_64可执行文件
# ============================================================

name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "python-cicd-learning"

jobs:
  # ==================== Job 1: 代码质量检查 ====================
  lint:
    name: 🔍 代码质量检查 (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies (with flake8)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  # ==================== Job 2: 单元测试 ====================
  test:
    name: 🧪 单元测试 (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run pytest tests
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: 📊 Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ==================== Job 3: 构建可执行程序 🆕 ====================
  build:
    name: 🏗️ 构建 Linux 可执行程序 (PyInstaller)
    runs-on: ubuntu-latest
    needs: test  # 测试通过后才能构建

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies (含 PyInstaller)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── PyInstaller 打包 ───
      #   --onefile:     打包成单个可执行文件（运行时自动解压到临时目录）
      #   --name:        输出文件名
      #   --clean:       清除缓存和临时文件，确保构建干净
      #   --noconfirm:   自动确认覆盖（CI 环境不需要交互）
      #   --log-level:   控制日志详细程度
      - name: 🏗️ Build executable with PyInstaller
        run: |
          echo "=========================================="
          echo "  🏗️ 开始 PyInstaller 打包..."
          echo "=========================================="
          echo ""

          # 获取系统信息
          echo "🖥️ 构建环境:"
          uname -a
          python --version
          echo ""

          # 执行打包
          pyinstaller \
            --onefile \
            --name "${{ env.APP_NAME }}" \
            --clean \
            --noconfirm \
            --log-level=INFO \
            main.py

          echo ""
          echo "=========================================="
          echo "  ✅ 打包完成！"
          echo "=========================================="

          # 显示产物信息
          echo ""
          echo "📦 产物:"
          ls -lh dist/${{ env.APP_NAME }}
          file dist/${{ env.APP_NAME }}

      # ─── 验证可执行文件能正常运行 ───
      - name: ✅ Verify built executable
        run: |
          echo "🔍 验证可执行文件..."
          chmod +x dist/${{ env.APP_NAME }}

          # 实际运行一次，确保能正常工作
          ./dist/${{ env.APP_NAME }}

          echo ""
          echo "✅ 可执行文件验证通过！"

      # ─── 上传构建产物 artifact ───
      #    供后续 release job 下载并附加到 GitHub Release
      - name: 📤 Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-executable
          path: dist/${{ env.APP_NAME }}
          retention-days: 7
          if-no-files-found: error

      # ─── 构建摘要 ───
      - name: 📋 Build summary
        if: always()
        run: |
          echo "## 🏗️ 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 内容 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| **平台** | Linux x86_64 (Ubuntu 22.04) |" >> $GITHUB_STEP_SUMMARY
          echo "| **打包器** | PyInstaller (--onefile) |" >> $GITHUB_STEP_SUMMARY
          echo "| **产物** | \`${{ env.APP_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **大小** | \`$(du -sh dist/${{ env.APP_NAME }} | cut -f1)\` |" >> $GITHUB_STEP_SUMMARY
          FILE_INFO=$(file dist/${{ env.APP_NAME }})
          echo "| **类型** | \`${FILE_INFO}\` |" >> $GITHUB_STEP_SUMMARY

  # ==================== Job 4: 模拟部署 ====================
  deploy:
    name: 🚀 模拟部署
    runs-on: ubuntu-latest
    needs: test  # 与 build 并行
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Simulate deployment
        run: |
          echo "=========================================="
          echo "  🚀 开始模拟部署..."
          echo "=========================================="
          echo ""
          echo "📍 部署环境: ${{ github.ref }}"
          echo "🔗 提交SHA: ${{ github.sha }}"
          echo "👤 触发者: @${{ github.actor }}"
          echo "🕐 部署时间: $(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo ""

          echo "✅ 运行主程序验证..."
          python main.py

          echo ""
          echo "=========================================="
          echo "  ✅ 部署成功！（模拟）"
          echo "=========================================="

      - name: 📢 Deployment summary
        if: always()
        run: |
          echo "## 🚀 部署摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **环境**: Production (模拟)" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **触发者**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **状态**: ✅ 成功" >> $GITHUB_STEP_SUMMARY

  # ==================== Job 5: 自动发布 Release ====================
  release:
    name: 📦 发布 Release (含可执行程序)
    runs-on: ubuntu-latest
    needs: [build, deploy]  # 必须构建和部署都成功！
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── Step 1: 从 build job 下载可执行文件 ───
      - name: 📥 Download executable from build job
        uses: actions/download-artifact@v4
        with:
          name: linux-executable
          path: dist/

      # ─── Step 2: 生成版本号和构建信息 ───
      - name: 🔖 Generate version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            DATE=$(date '+%Y.%m.%d')
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            VERSION="v${DATE}.dev-${SHORT_SHA}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION#'v'}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║     📦 版本发布信息                     ║"
          echo "╠══════════════════════════════════════╣"
          echo "║  版本号: ${VERSION}"
          echo "║  分支:   ${{ github.ref_name }}"
          echo "║  提交:   ${{ github.sha }}"
          echo "║  作者:   @${{ github.actor }}"
          echo "║  时间:   $(date '+%Y-%m-%d %H:%M:%S UTC') "
          echo "╚══════════════════════════════════════╝"

      # ─── Step 3: 运行测试生成报告 ───
      - name: 🧪 Run final tests for release report
        id: test_report
        run: |
          TEST_OUTPUT=$(python3 -m pytest tests/ -v --tb=no 2>&1)
          TOTAL=$(echo "$TEST_OUTPUT" | grep -oP '\d+(?=\s*passed)' | tail -1)
          echo "tests_passed=${TOTAL:-0}" >> "$GITHUB_OUTPUT"
          echo "$TEST_OUTPUT" > test_report.txt
          echo "✅ 测试完成: ${TOTAL:-0} 个用例通过"

      # ─── Step 4: 打包源码和产物 ───
      - name: 📁 Package source code and artifacts
        run: |
          VERSION="${{ steps.version.outputs.version_no_v }}"
          APP="${{ env.APP_NAME }}"

          mkdir -p dist/python-cicd-learning-${VERSION}

          rsync -av \
            --exclude='.git' \
            --exclude='venv' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='*.pyc' \
            --exclude='.coverage' \
            . dist/python-cicd-learning-${VERSION}/

          cat > dist/python-cicd-learning-${VERSION}/CHANGELOG.md << EOF
          # Changelog

          ## ${{ steps.version.outputs.version }} ($(date '+%Y-%m-%d'))

          ### ✅ Features
          - 基础计算器模块（加减乘除 + 除零异常处理）
          - 税费计算模块（个税累进税率 / 增值税 / 社保公积金）
          - 项目配置管理模块（多环境支持）

          ### ✅ Quality
          - 44+ pytest 单元测试用例（100% 通过）
          - PEP8 代码规范检查（flake8）
          - GitHub Actions CI/CD 全自动化流水线
          - PyInstaller 单文件可执行程序（无需 Python 环境）

          ### 📦 Included Binary
          - Linux x86_64 ELF executable (Ubuntu 22.04 compatible)
          EOF

          cd dist
          tar -czvf python-cicd-learning-${VERSION}.source.tar.gz python-cicd-learning-${VERSION}/
          zip -r python-cicd-learning-${VERSION}.source.zip python-cicd-learning-${VERSION}/

          # 重命名二进制文件（带上版本号和平台标识）
          cp ${APP} ${APP}-linux-x86_64-${VERSION}
          chmod +x ${APP}-linux-x86_64-${VERSION}

          echo ""
          echo "📦 打包完成:"
          ls -lh python-cicd-learning-${VERSION}.* ${APP}-linux-x86_64-* 2>/dev/null

      # ─── Step 5: 创建 GitHub Release ───
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "🚀 Release ${{ steps.version.outputs.version }}"
          body: |
            ## 🎉 Python CI/CD Learning Project — ${{ steps.version.outputs.version }}

            **自动发布于** $(date '+%Y-%m-%d %H:%M UTC') by @${{ github.actor }}

            ---

            ### 📋 本次发布内容

            | 项目 | 详情 |
            |------|------|
            | **版本** | `${{ steps.version.outputs.version }}` |
            | **提交** | `${{ github.sha }}` |
            | **分支** | `${{ github.ref_name }}` |
            | **触发者** | @${{ github.actor }} |
            | **测试结果** | ✅ ${{ steps.test_report.outputs.tests_passed }} 个用例全部通过 |
            | **代码检查** | ✅ flake8 通过 |

            ### 📦 下载附件

            | 文件 | 说明 | 平台 |
            |------|------|------|
            | `*-linux-x86_64-*.elf` | **独立可执行程序（推荐）** | Ubuntu 22.04+ / Debian 12+ |
            | `*.source.tar.gz` | 源码压缩包 | Linux/macOS |
            | `*.source.zip` | 源码压缩包 | Windows |

            > ⭐ **可执行程序**: 已用 PyInstaller 打包为单文件 ELF 二进制，
            > 无需安装 Python 环境，直接 `chmod +x` 后即可运行！

            ### 🔧 快速开始（两种方式）

            <details>
            <summary>方式一：下载可执行程序运行（无需 Python）</summary>

            ```bash
            # 下载可执行文件
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/${{ env.APP_NAME }}-linux-x86_64-${{ steps.version.outputs.version_no_v }}

            # 赋予执行权限
            chmod +x ${{ env.APP_NAME }}-linux-x86_64-${{ steps.version.outputs.version_no_v }}

            # 直接运行！
            ./${{ env.APP_NAME }}-linux-x86_64-${{ steps.version.outputs.version_no_v }}
            ```
            </details>

            <details>
            <summary>方式二：从源码运行（需要 Python 环境）</summary>

            ```bash
            tar -xzvf python-cicd-learning-${{ steps.version.outputs.version_no_v }}.source.tar.gz
            cd python-cicd-learning-${{ steps.version.outputs.version_no_v }}/
            python3 -m venv venv && source venv/bin/activate
            pip install -r requirements.txt
            python main.py
            ```
            </details>

            ### ⚠️ 说明

            > 这是一个 CI/CD 学习演示项目的自动发布。
            > 每次 push 到 main 分支都会自动创建新的 dev 版本 Release。
            > 如需发布正式版本，请使用 `git tag v1.0.0 && git push origin v1.0.0`。

            ---
            *🤖 由 [GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) 自动生成*
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: |
            dist/*.tar.gz
            *.zip
            dist/*-linux-x86_64-*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Step 6: Release 后置处理 ───
      - name: 📢 Release summary
        if: always()
        run: |
          echo "## 📦 Release 发布完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 内容 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| **版本** | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **类型** | ${{ startsWith(github.ref, 'refs/tags/') && '正式版' || '开发版(Pre-release)' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **测试** | ${{ steps.test_report.outputs.tests_passed }} passed |" >> $GITHUB_STEP_SUMMARY
          echo "| **附件** | 源码(tar.gz + zip) + Linux可执行程序(.elf) |" >> $GITHUB_STEP_SUMMARY
